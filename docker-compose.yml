# docker-compose.yml
# Local development with MongoDB
# Usage: docker-compose up --build

version: "3.9"

services:
  app:
    build:
      context: .
      target: production
    container_name: amy-assistant
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27017/amy_assistant
      - MONGODB_DB_NAME=amy_assistant
      # Override these with your real keys:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CALENDAR_ID=${CALENDAR_ID}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      # Mount service-account.json for Google Calendar
      - ./service-account.json:/usr/src/app/service-account.json:ro
    networks:
      - amy-net

  mongo:
    image: mongo:7
    container_name: amy-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - amy-net
    restart: unless-stopped

  # Optional: Mongo Express for DB browsing at http://localhost:8081
  mongo-express:
    image: mongo-express:latest
    container_name: amy-mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin123
    depends_on:
      - mongo
    networks:
      - amy-net
    restart: unless-stopped

volumes:
  mongo-data:

networks:
  amy-net:
    driver: bridge
